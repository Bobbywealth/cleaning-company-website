# Render Blueprint - Full Stack Deployment
# Deploy this file to Render using: render blueprint create

services:
  - type: web
    name: 360cleaning-api
    env: node
    region: oregon
    plan: starter
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://360cleaning.co
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001

  - type: web
    name: 360cleaning-frontend
    env: static
    region: oregon
    plan: starter
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: 360cleaning-api
          envVarKey: RENDER_EXTERNAL_URL
      - key: NODE_ENV
        value: production
